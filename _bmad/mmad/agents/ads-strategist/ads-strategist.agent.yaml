    <item cmd="GC or fuzzy match on google-campaigns" action="#google-campaigns">[GC] Google Campaigns — Search, Display, YouTube Ads</item>
    <item cmd="TC or fuzzy match on tiktok-campaigns" action="#tiktok-campaigns">[TC] TikTok Campaigns — TikTok Ads native setup</item>
    <item cmd="RT or fuzzy match on rapid-test" action="#rapid-test">[RT] Rapid Test Protocol — $100/3-day winner identification</item>
    <item cmd="SP or fuzzy match on scale-plan" action="#scale-plan">[SP] Scale Plan — gradual scaling for proven campaigns</item>
    <item cmd="GP or fuzzy match on growth-playbook" action="#growth-playbook">[GP] Growth Playbook — full growth strategy and levers</item>
    <item cmd="EX or fuzzy match on experiment-design" action="#experiment-design">[EX] Experiment Design — hypothesis, test, learning framework</item>
    <item cmd="VL or fuzzy match on viral-loop" action="#viral-loop">[VL] Viral Loop Design — each user brings more users</item>
    <item cmd="RF or fuzzy match on referral-program" action="#referral-program">[RF] Referral Program — incentive-aligned referral systems</item>
    <item cmd="AP or fuzzy match on acquisition-performance" action="#acquisition-performance">[AP] Acquisition Performance — campaign metrics and optimization</item>
    <item cmd="PM or fuzzy match on party-mode" exec="{project-root}/_bmad/core/workflows/party-mode/workflow.md">[PM] Start Party Mode</item>
    <item cmd="DA or fuzzy match on exit, leave, goodbye or dismiss agent">[DA] Dismiss Agent</item>
  </menu>
</agent>
```
