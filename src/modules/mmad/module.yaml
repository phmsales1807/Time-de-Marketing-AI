code: mmad
name: "MMAD: Marketing Method of Agile AI-Driven Development"
header: "Framework completo de marketing digital com agentes especializados, workflows guiados e protocolos de automação"
subheader: "22 agentes | 14 workflows | 7 camadas | Da estratégia à execução com feedback loops contínuos"
default_selected: false

# Variables from Core Config inserted:
## user_name
## communication_language
## document_output_language
## output_folder

project_name:
  prompt: "What is the name of your project or brand?"
  default: "{directory_name}"
  result: "{value}"

project_type:
  prompt: "What type of project is this?"
  default: "infoproduto"
  required: true
  result: "{value}"
  single-select:
    - value: "infoproduto"
      label: "Infoproduto - Digital product / course / mentorship"
    - value: "ecommerce"
      label: "E-commerce - Online store"
    - value: "saas"
      label: "SaaS - Software as a Service"
    - value: "negocio-local"
      label: "Negócio Local - Local business"
    - value: "agencia"
      label: "Agência - Marketing agency"

platforms:
  prompt: "Which social media platforms are your priority?"
  default: ["instagram", "youtube", "tiktok"]
  required: true
  result: "{value}"
  multi-select:
    - value: "instagram"
      label: "Instagram"
    - value: "youtube"
      label: "YouTube"
    - value: "tiktok"
      label: "TikTok"

mmad_output:
  prompt: "Where should MMAD output files be stored?"
  default: "{output_folder}/mmad"
  result: "{project-root}/{value}"

brand_assets:
  prompt: "Where should brand assets be stored?"
  default: "{output_folder}/mmad/brand"
  result: "{project-root}/{value}"

campaign_assets:
  prompt: "Where should campaign assets be stored?"
  default: "{output_folder}/mmad/campaigns"
  result: "{project-root}/{value}"

content_assets:
  prompt: "Where should content assets be stored?"
  default: "{output_folder}/mmad/content"
  result: "{project-root}/{value}"

funnel_assets:
  prompt: "Where should funnel assets be stored?"
  default: "{output_folder}/mmad/funnels"
  result: "{project-root}/{value}"

analytics_assets:
  prompt: "Where should analytics reports be stored?"
  default: "{output_folder}/mmad/analytics"
  result: "{project-root}/{value}"

vps_deploy_enabled:
  prompt: "Do you have a VPS for Dynamic LP Pipeline deployment?"
  default: false
  result: "{value}"
